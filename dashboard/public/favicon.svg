<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0d1117"/>

  <!-- Radar rings -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.35"/>
  <circle cx="16" cy="16" r="7.5"  fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.55"/>
  <circle cx="16" cy="16" r="3.5"  fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.8"/>

  <!-- Crosshair lines -->
  <line x1="4.5" y1="16" x2="27.5" y2="16" stroke="#00ff41" stroke-width="0.8" opacity="0.3"/>
  <line x1="16" y1="4.5" x2="16" y2="27.5" stroke="#00ff41" stroke-width="0.8" opacity="0.3"/>

  <!-- Sweep sector (NE quadrant) -->
  <path d="M16,16 L16,4.5 A11.5,11.5 0 0,1 24.6,20.25 Z"
        fill="#00ff41" opacity="0.12"/>
  <line x1="16" y1="16" x2="24.6" y2="20.25"
        stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="16" x2="16" y2="4.5"
        stroke="#00ff41" stroke-width="1" opacity="0.5"/>

  <!-- Contact blip on middle ring -->
  <circle cx="21.8" cy="9.3" r="1.8" fill="#00ff41"/>

  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.5" fill="#00ff41"/>
</svg>
